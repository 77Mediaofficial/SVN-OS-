<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SVN OS — Creator Operating System</title>
  <meta name="description" content="One quiet place to run a creative business: content pipeline, posting calendar, brand deals, and income ledger." />
  <meta name="theme-color" content="#0a0a09" />

  <meta property="og:title" content="SVN OS — Creator Operating System" />
  <meta property="og:description" content="Content pipeline, posting calendar, brand deals, and ledger — one place." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SVN OS" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <a class="skip-link" href="#outlet">Skip to content</a>
  <div class="grain" aria-hidden="true"></div>

  <!-- ── Auth gate (shown signed-out when Supabase is wired) ── -->
  <div id="auth-gate" class="auth-gate" hidden>
    <div class="auth-panel">
      <p class="kicker">SVN OS</p>
      <h1 class="auth-title">Run the whole<br /><em>creative business.</em></h1>
      <p class="auth-sub">Content pipeline, posting calendar, brand deals, and ledger — one quiet place.</p>

      <form id="auth-form" class="auth-form" novalidate>
        <div class="field" id="auth-name-field" hidden>
          <label for="auth-name">Name</label>
          <input id="auth-name" name="full_name" autocomplete="name" placeholder="Your name" />
        </div>
        <div class="field">
          <label for="auth-email">Email</label>
          <input id="auth-email" name="email" type="email" required autocomplete="email" placeholder="you@studio.com" />
        </div>
        <div class="field">
          <label for="auth-password">Password</label>
          <input id="auth-password" name="password" type="password" required minlength="6" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <p class="auth-error" id="auth-error" hidden></p>
        <button class="btn btn-primary btn-block" type="submit" id="auth-submit">Sign in</button>
      </form>
      <p class="auth-toggle-line" id="auth-toggle-line">No account? <button type="button" class="linklike" id="auth-toggle">Create one</button></p>
    </div>
  </div>

  <!-- ── App shell ── -->
  <div id="app" class="app" hidden>
    <aside class="sidebar">
      <a href="/" data-link class="brand" aria-label="SVN OS home">
        <span class="brand-mark">SVN<span class="brand-os">&nbsp;OS</span></span>
        <span class="brand-sub">creator operating system</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a href="/" data-link data-nav="dashboard" class="nav-link">
          <svg viewBox="0 0 18 18" aria-hidden="true"><rect x="2" y="2" width="6" height="6" rx="1.2"/><rect x="10" y="2" width="6" height="6" rx="1.2"/><rect x="2" y="10" width="6" height="6" rx="1.2"/><rect x="10" y="10" width="6" height="6" rx="1.2"/></svg>
          <span>Today</span>
        </a>
        <a href="/content" data-link data-nav="content" class="nav-link">
          <svg viewBox="0 0 18 18" aria-hidden="true"><path d="M9 2 16 5.5 9 9 2 5.5Z"/><path d="M2 9.25 9 12.75 16 9.25"/><path d="M2 12.75 9 16.25 16 12.75"/></svg>
          <span>Content Engine</span>
        </a>
        <a href="/calendar" data-link data-nav="calendar" class="nav-link">
          <svg viewBox="0 0 18 18" aria-hidden="true"><rect x="2" y="3.5" width="14" height="12.5" rx="1.5"/><path d="M2 7.5h14M6 1.5v3.5M12 1.5v3.5"/></svg>
          <span>Calendar</span>
        </a>
        <a href="/deals" data-link data-nav="deals" class="nav-link">
          <svg viewBox="0 0 18 18" aria-hidden="true"><rect x="1.5" y="4" width="15" height="10.5" rx="1.8"/><path d="M1.5 7.5h15"/><path d="M4.5 11.25h4"/></svg>
          <span>Deals &amp; Ledger</span>
        </a>
      </nav>

      <div class="sidebar-foot">
        <button id="demo-pill" class="demo-pill" hidden type="button">
          <span class="demo-dot" aria-hidden="true"></span>Demo data · connect Supabase
        </button>
        <div class="user-chip">
          <span class="avatar" id="user-avatar">—</span>
          <span class="user-name" id="user-name">—</span>
          <button class="iconbtn" id="signout-btn" title="Sign out" aria-label="Sign out">
            <svg viewBox="0 0 18 18" aria-hidden="true"><path d="M11.5 6V3.5a1 1 0 0 0-1-1h-7a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V12"/><path d="M7 9h9.5M13.5 6l3 3-3 3"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div id="outlet" class="view" tabindex="-1"></div>
    </main>
  </div>

  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <dialog id="confirm-dialog" class="modal modal-confirm">
    <form method="dialog">
      <p id="confirm-msg" class="confirm-msg">Are you sure?</p>
      <div class="modal-actions">
        <button class="btn" value="cancel">Cancel</button>
        <button class="btn btn-danger" value="ok" id="confirm-ok">Delete</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
