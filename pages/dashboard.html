<section class="cmd-state" aria-label="Today">
  <h1 class="sr-only-h1">Today</h1>
  <div class="cmd-top">
    <span class="cmd-pulse" aria-hidden="true"></span>
    <span class="cmd-greeting" id="cmd-greeting">—</span>
    <span class="cmd-active">System active</span>
  </div>
  <div class="cmd-clock" id="cmd-clock">--:--:--</div>
  <p class="kicker cmd-slate" id="dash-slate">—</p>
</section>

<section class="stat-band" id="dash-stats" aria-label="Key numbers">
  <div class="stat"><div class="stat-label">Revenue this month</div><div class="stat-num skel skel-num">—</div><div class="stat-foot">&nbsp;</div></div>
  <div class="stat"><div class="stat-label">Pipeline value</div><div class="stat-num skel skel-num">—</div><div class="stat-foot">&nbsp;</div></div>
  <div class="stat"><div class="stat-label">Active projects</div><div class="stat-num skel skel-num">—</div><div class="stat-foot">&nbsp;</div></div>
  <div class="stat"><div class="stat-label">Due in 7 days</div><div class="stat-num skel skel-num">—</div><div class="stat-foot">&nbsp;</div></div>
</section>

<div class="dash-bento">
  <section class="panel b-actions" aria-labelledby="actions-label">
    <div class="panel-head">
      <h2 class="section-label" id="actions-label">Action items</h2>
      <span class="count" id="actions-count"></span>
    </div>
    <div id="actions-list" class="rows">
      <div class="skel skel-row"></div>
      <div class="skel skel-row"></div>
      <div class="skel skel-row"></div>
    </div>
  </section>

  <section class="panel b-pipeline" aria-labelledby="pipeline-label">
    <div class="panel-head">
      <h2 class="section-label" id="pipeline-label">Pipeline</h2>
      <a class="linklike" data-link href="/content">Open board</a>
    </div>
    <div id="pipeline-bars">
      <div class="skel skel-row"></div>
      <div class="skel skel-row"></div>
    </div>
  </section>

  <section class="panel b-month" aria-labelledby="month-label">
    <div class="panel-head">
      <h2 class="section-label" id="month-label">This month</h2>
      <a class="linklike" data-link href="/deals">Open ledger</a>
    </div>
    <div id="ledger-mini">
      <div class="skel skel-row"></div>
      <div class="skel skel-row"></div>
    </div>
  </section>

  <section class="panel b-upnext" aria-labelledby="upnext-label">
    <div class="panel-head">
      <h2 class="section-label" id="upnext-label">Up next on the calendar</h2>
      <a class="linklike" data-link href="/calendar">Open calendar</a>
    </div>
    <div id="upnext-list" class="rows">
      <div class="skel skel-row"></div>
      <div class="skel skel-row"></div>
    </div>
  </section>
</div>
